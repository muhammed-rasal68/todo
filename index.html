<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Todo App</title>
        <link rel="stylesheet" href="style.css">
        <link rel="manifest" href="manifest.json">
        <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
        <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
        <link rel="manifest" href="images/site.webmanifest">
        <meta name="theme-color" content="#7c3aed">
    </head>
    <body>
        <button class="install-btn">
            Install App
        </button>
        <div class="wrapper">
            <input type="checkbox" id="theme">
            <div class="header">
                <h1>My Tasks</h1>
                <label for="theme" class="theme-btn">
                    <img src="images/black.svg" id="icon" alt="">
                </label>
            </div>
            <div class="todo-input">
                <input type="text" placeholder="What do you want to do?">
                <img class="add-btn" src="images/blue-add.svg" width="42" height="42" alt="">
            </div>
            <div class="todo">
                <h2>To Do</h2>
                <ul>
                    <li>
                        <div class="task">
                            <img class="check" src="images/circle.svg" width="18" height="18" alt="">
                            <p>Buy some vegetables</p>
                        </div>
                        <img class="delete" src="images/delete.svg" width="20" height="20" alt="">
                    </li>
                    <li>
                        <div class="task">
                            <img class="check" src="images/circle.svg" width="18" height="18" alt="">
                            <p>Finish coding project</p>
                        </div>
                        <img class="delete" src="images/delete.svg" width="20" height="20" alt="">
                    </li>
                </ul>
            </div>
            <div class="finished">
                <h2>Completed</h2>
                <ul>
                    <li class="completed">
                        <div class="task">
                            <img class="check" src="images/tick.svg" width="20" height="20" alt="">
                            <p>Read a book</p>
                        </div>
                        <img class="delete" src="images/delete.svg" width="20" height="20" alt="">
                    </li>
                </ul>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
