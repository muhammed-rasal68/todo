<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Todo App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7c3aed">
</head>
<body>
    <div class="wrapper"wrapper">
        <div class="offline-message">
            <h1>You're Offline</h1>
            <p>Your todo data is saved locally and will sync when you're back online.</p>
            <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
        </div>
    </div>
    <style>
        .offline-message {
            text-align: center;
            padding: 40px 20px;
            max-width: 400px;
            margin: 0 auto;
        }
        .offline-message h1 { font-size: 48px; margin-bottom: 16px; color: #7c3aed; }
        .offline-message p { font-size: 18px; color: #666; margin-bottom: 24px; }
        body:has(#theme:checked) .offline-message p { color: #aaa; }
        .retry-btn {
            background: #7c3aed;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</body>
</html>
